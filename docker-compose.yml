services:
  postgres:
    image: postgres:16-alpine
    container_name: inspection-platform-postgres
    environment:
      POSTGRES_DB: inspection_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inspection_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inspection-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: inspection-platform-api
    environment:
      APP_NAME: Inspection Platform API
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/inspection_platform
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: YvMY4dWbJ9K8Q4p4fiI7T-4vI4D1vS0mTgIYbK0lF5A=
      HTTP_TIMEOUT_SECONDS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18000:8000"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  redis_data:
